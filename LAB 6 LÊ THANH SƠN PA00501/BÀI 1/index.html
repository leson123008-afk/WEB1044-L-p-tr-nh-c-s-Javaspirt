<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 1 - Thông Tin Sinh Viên</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d10;
            --accent: #e8c97e;
            --text: #f0ece2;
            --muted: #7a7a8a;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(232, 201, 126, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(232, 201, 126, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridPan 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridPan {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 48px 48px;
            }
        }

        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 14px;
            border-radius: 2px;
            margin-bottom: 20px;
            opacity: 0.85;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 1.15;
            margin-bottom: 12px;
        }

        h1 span {
            color: var(--accent);
        }

        .sub {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #0d0d10;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 14px 32px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(232, 201, 126, 0.25);
            background: #f5d98e;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body>
    <div class="hero">
        <div class="badge">&#10022; Bài tập JavaScript</div>
        <h1>Thông Tin <span>Sinh Viên</span></h1>
        <p class="sub">Nhấn nút bên dưới để mở cửa sổ thông tin sinh viên</p>
        <button class="btn" onclick="openStudentInfo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <path d="M3 9h18M9 21V9" />
            </svg>
            Mở Cửa Sổ
        </button>
    </div>

    <script src="bai1.js"></script>
</body>

</html>
