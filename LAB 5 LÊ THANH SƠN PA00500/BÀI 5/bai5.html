<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Bài 5</title>
    <link rel="icon" href="data:,">
</head>

<body>

    <h2>Bài 5 - Quản lý sinh viên</h2>
    <div id="output"></div>

    <script>
        // Class Student
        class Student {
            constructor(name, age, score) {
                this.name = name;
                this.age = age;
                this.score = score;
            }

            getGrade() {
                if (this.score >= 8) return "Giỏi";
                if (this.score >= 6.5) return "Khá";
                if (this.score >= 5) return "Trung bình";
                return "Yếu";
            }

            getInfo() {
                return `${this.name} - ${this.age} tuổi - Điểm: ${this.score} - ${this.getGrade()}`;
            }
        }

        // Class Classroom
        class Classroom {
            constructor() {
                this.students = [];
            }

            addStudent(student) {
                this.students.push(student);
            }

            getAverageScore() {
                let total = this.students.reduce((sum, s) => sum + s.score, 0);
                return total / this.students.length;
            }

            getAllStudents() {
                return this.students.map(s => s.getInfo()).join("<br>");
            }
        }

        // Test
        let s1 = new Student("An", 16, 8.5);
        let s2 = new Student("Bình", 17, 6.8);

        let classroom = new Classroom();
        classroom.addStudent(s1);
        classroom.addStudent(s2);

        document.getElementById("output").innerHTML = `
        <b>Danh sách:</b><br>
        ${classroom.getAllStudents()} <br><br>
        <b>Điểm trung bình:</b> ${classroom.getAverageScore().toFixed(2)}
    `;
    </script>

</body>

</html>
