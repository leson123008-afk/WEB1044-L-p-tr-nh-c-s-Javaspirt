<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài 4 – Sắp xếp sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        th {
            background: #4a90e2;
            color: #fff;
            padding: 12px 16px;
            text-align: left;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f0f7ff;
        }
    </style>
</head>

<body>
    <h2>Bài 4: Sắp xếp sản phẩm theo giá tăng dần</h2>

    <script src="script.js"></script>
</body>

</html>
