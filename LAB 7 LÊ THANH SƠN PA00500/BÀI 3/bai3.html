<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>

    <!-- Fix lỗi favicon -->
    <link rel="icon" href="data:,">

    <style>
        /* CSS đầy đủ để không cần file style.css riêng */
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .product-image {
            position: relative;
            height: 220px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .like-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .like-icon:hover {
            transform: scale(1.2);
        }

        .like-icon.liked {
            color: #e74c3c;
            animation: heartBeat 0.4s ease;
        }

        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.35);
            }

            100% {
                transform: scale(1);
            }
        }

        .product-info {
            padding: 18px;
            text-align: center;
        }

        .product-name {
            margin: 0 0 8px 0;
            font-size: 1.25rem;
            color: #2c3e50;
        }

        .product-price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #34495e;
            transform: translateY(-2px);
        }

        /* Toast thông báo */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 26px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        .toast-success {
            background: #28a745;
        }

        .toast-info {
            background: #17a2b8;
        }
    </style>
</head>

<body>
    <h1>Danh sách sản phẩm</h1>

    <div class="product-list" id="product-list"></div>

    <script src="script.js"></script>
</body>

</html>
